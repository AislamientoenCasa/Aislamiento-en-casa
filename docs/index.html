<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aislamiento en Casa</title>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{font-family:Arial;margin:0}
section{padding:40px;text-align:center}

.editable-img{cursor:pointer}
.editable-img:hover{outline:3px dashed #2f7d57}

/* BEFORE AFTER */
.before-after{position:relative;max-width:600px;margin:auto}
.before-after img{width:100%}
.img-overlay{position:absolute;top:0;left:0;width:50%;overflow:hidden}
.slider{position:absolute;top:0;left:50%;width:3px;height:100%;background:#fff;cursor:ew-resize}

/* EDIT PANEL */
#btnEdit{
position:fixed;bottom:20px;left:20px;
background:#2f7d57;color:#fff;border:none;
padding:12px 18px;border-radius:999px;cursor:pointer;z-index:999
}
#panel{
position:fixed;top:20px;right:20px;width:260px;
background:#fff;padding:12px;border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;z-index:999
}
</style>
</head>

<body>

<section data-edit="hero">
<h1 contenteditable="true">AISLAMIENTO EN CASA</h1>
<p contenteditable="true">Soluciones profesionales</p>
</section>

<section data-edit="antesdespues">
<h2>Antes / Después</h2>
<div class="before-after">
<img id="imgAntes" class="editable-img" src="https://via.placeholder.com/600">
<div class="img-overlay" id="overlay">
<img id="imgDespues" class="editable-img" src="https://via.placeholder.com/600">
</div>
<div class="slider" id="slider"></div>
</div>
</section>

<section data-edit="sistema">
<h2>Sistema SATE</h2>
<img id="imgSistema" class="editable-img" src="https://via.placeholder.com/400">
</section>

<section data-edit="transparencia">
<h2>Transparencia</h2>
<img id="imgTransparencia" class="editable-img" src="https://via.placeholder.com/400">
</section>

<section data-edit="control">
<h2>Control</h2>
<img id="imgControl" class="editable-img" src="https://via.placeholder.com/400">
</section>

<button id="btnEdit">⚙️ Editar</button>

<div id="panel">
<button onclick="cambiarFondo()">🖼 Fondo</button><br><br>
Mover X <input type="range" min="0" max="100" value="50" onchange="moveX(this.value)"><br>
Mover Y <input type="range" min="0" max="100" value="50" onchange="moveY(this.value)"><br>
Zoom <input type="range" min="50" max="200" value="100" onchange="zoom(this.value)">
</div>

<script>
let edit=false,selected=null;

document.getElementById("btnEdit").onclick=()=>{
edit=!edit;
panel.style.display=edit?"block":"none";
};

document.addEventListener("click",e=>{
if(!edit)return;
const b=e.target.closest("[data-edit]");
if(b)selected=b;
});

function moveX(v){if(selected)selected.style.backgroundPositionX=v+"%";}
function moveY(v){if(selected)selected.style.backgroundPositionY=v+"%";}
function zoom(v){if(selected)selected.style.backgroundSize=v+"%";}

// CLOUDINARY
function openUpload(img){
const widget=cloudinary.createUploadWidget({
cloudName:"dnenidufl",
uploadPreset:"mi_upload"
},(e,r)=>{
if(r.event==="success"){
img.src=r.info.secure_url;
}
});
widget.open();
}

document.querySelectorAll(".editable-img").forEach(img=>{
img.addEventListener("click",()=>{
if(!edit)return;
openUpload(img);
});
});

// BEFORE AFTER SLIDER
let drag=false;
slider.onmousedown=()=>drag=true;
window.onmouseup=()=>drag=false;

window.onmousemove=e=>{
if(!drag)return;
let rect=document.querySelector(".before-after").getBoundingClientRect();
let x=e.clientX-rect.left;
x=Math.max(0,Math.min(x,rect.width));
overlay.style.width=x+"px";
slider.style.left=x+"px";
};

// FONDO
function cambiarFondo(){
const widget=cloudinary.createUploadWidget({
cloudName:"dnenidufl",
uploadPreset:"mi_upload"
},(e,r)=>{
if(r.event==="success"){
selected.style.backgroundImage=`url(${r.info.secure_url})`;
}
});
widget.open();
}
</script>

</body>
</html>
