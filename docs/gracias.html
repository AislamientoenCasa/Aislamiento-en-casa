<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias | Aislamiento en Casa</title>
<meta http-equiv="refresh" content="4;url=index.html">

<style>
:root{
  --primary:#2f7d57;
  --primary-dark:#1e5239;
  --bg:#eef7f1;
  --bg-soft:#f7fbf8;
  --text:#183028;
  --muted:#5f7a70;
  --line:#dbe9df;
  --shadow:0 20px 50px rgba(24,48,40,0.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:linear-gradient(180deg,var(--bg-soft) 0%, var(--bg) 100%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  max-width:700px;
  width:100%;
  background:white;
  padding:50px 35px;
  border-radius:28px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  text-align:center;
}

h1{
  margin-top:0;
  font-size:2.2rem;
  margin-bottom:15px;
}

p{
  color:var(--muted);
  font-size:1.05rem;
  margin-bottom:14px;
}

.btn{
  padding:16px 28px;
  border-radius:50px;
  text-decoration:none;
  font-weight:700;
  display:inline-block;
  margin-top:10px;
}

.btn-main{
  background:var(--primary);
  color:white;
}

.btn-wa{
  background:#25d366;
  color:white;
  margin-left:10px;
}

@media(max-width:768px){
  .btn{
    display:block;
    margin:10px 0 0 0;
  }

  .btn-wa{
    margin-left:0;
  }
}
</style>
</head>
<body>

<div class="card">
  <h1>Gracias</h1>
  <p>Hemos recibido tu solicitud correctamente.</p>
  <p>Un técnico revisará la información y se pondrá en contacto contigo lo antes posible.</p>
  <p>Serás redirigido automáticamente en unos segundos…</p>

  <a href="index.html" class="btn btn-main">Volver ahora</a>
  <a href="https://wa.me/34670237842?text=Hola,%20acabo%20de%20enviar%20mi%20solicitud" class="btn btn-wa">Escribir por WhatsApp</a>
</div>

</body>
</html>
